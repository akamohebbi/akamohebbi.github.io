<!DOCTYPE html>
<html lang="{{ site.language }}" dir="{{ site.direction }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="{{ site.theme_color }}">

    <title>{% if page.title %}{{ page.title }} {{ site.title_sep }} {{ site.title }}{% else %}{{ site.title }} {{ site.title_sep }} {{ site.description }}{% endif %}</title>
    {% seo title=false %}

    <link rel="icon" type="image/x-icon" href="/img/icon.jpeg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/w3.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="layout-{{ page.layout }}">
    {{ content }}
    <script src="/js/global.js"></script>
</body>
</html>
